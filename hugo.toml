  [[menus.main]]
    name = "Setup"
    pageRef = "/learners/setup"
    weight = 5
  [[menus.main]]
    name = "Episodes"
    pageRef = "/episodes"
    weight = 10
  [[menus.main]]
    name = "Resources"
    identifier = "resources"
    weight = 30
  [[menus.main]]
    name = "Key Points"
    parent = "resources"
    pageRef = "/key-points"
    weight = 10
  [[menus.main]]
    name = "All-in-One"
    parent = "resources"
    pageRef = "/all-in-one"
    weight = 20
  [[menus.main]]
    name = "External Links"
    parent = "resources"
    pageRef = "/external-links"
    weight = 25
  [[menus.main]]
    name = "Reference"
    parent = "resources"
    pageRef = "/reference"
    weight = 30
  [[menus.main]]
    name = "Glossary"
    parent = "resources"
    pageRef = "/glossary"
    weight = 40
  [[menus.main]]
    name = "Profiles"
    parent = "resources"
    pageRef = "/profiles"
    weight = 50
  [[menus.main]]
    name = "All Images"
    parent = "resources"
    pageRef = "/extract-all-images"
