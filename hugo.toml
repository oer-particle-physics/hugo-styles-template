baseURL = "https://example.github.io/example-lesson/"
title = "Hugo Styles Starter Lesson"
locale = "en-US"
enableGitInfo = true
disableKinds = ["taxonomy", "term", "RSS"]

[module]
  [[module.imports]]
    path = "github.com/oer-particle-physics/hugo-styles"
    [[module.imports.mounts]]
      source = "archetypes"
      target = "archetypes"
    [[module.imports.mounts]]
      source = "assets"
      target = "assets"
    [[module.imports.mounts]]
      source = "layouts"
      target = "layouts"
    [[module.imports.mounts]]
      source = "static"
      target = "static"
    [[module.imports.mounts]]
      source = "package.json"
      target = "assets/_jsconfig/package.json"

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      definitionList = true
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [["\\[", "\\]"], ["$$", "$$"]]
          inline = [["\\(", "\\)"]]
    [markup.goldmark.renderer]
      unsafe = true

[params.banner]
  key = "hugo-styles-template-welcome-v2"
  message = "This site contains replaceable starter content for a new lesson."

[params.lesson]
  title = "Hugo Styles Starter Lesson"
  tagline = "A small, adaptable example for writing your own lesson."
  description = "Replace this sample with the topic, audience, and learning goals for your lesson."
  contact = "team@example.org"
  repo = "https://github.com/oer-particle-physics/hugo-styles-template"
  docsRepo = "https://github.com/oer-particle-physics/hugo-styles-template"
  editBranch = "main"
  copyrightHolder = "the authors"
  licenseName = "CC BY 4.0"
  licenseURL = "https://creativecommons.org/licenses/by/4.0/"
  lifecycle = "alpha"
  defaultView = "learner"
  enableSidebarNumbering = true

[params.navbar]
  displayTitle = true
  displayLogo = false

[params.search]
  enable = true
  type = "flexsearch"

  [params.search.flexsearch]
    index = "content"
    js = "js/vendor/flexsearch.bundle.min.js"
    maxPageResults = 12
    maxSectionResults = 8

[params.page.tabs]
  sync = true

[params.footer]
  displayPoweredBy = false
  displayCopyright = false

[params.versioning]
  enable = true
  defaultBranch = "main"
  menuName = "Versions"
  menuIdentifier = "versions"
  menuWeight = 70

  [params.versioning.latest]
    enable = true
    label = "Latest"

  [params.versioning.branches]
    refs = []
    patterns = []
    all = false

  [params.versioning.tags]
    refs = []
    patterns = []
    all = false

